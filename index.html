<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head> 
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <!-- Did You Know? Space Fact Section -->
    <section id="spaceFactSection" style="margin: 20px 0;">
      <div id="spaceFact" style="background:#e5e5e5;color:#0b3d91;padding:14px 18px;border-radius:8px;font-size:1.1rem;font-weight:bold;text-align:center;">
        <!-- Random fact will appear here -->
      </div>
    </section>

    <div class="filters">
      <label for="startDate">
        Start Date:
        <input type="date" id="startDate" />
      </label>
      <label for="endDate">
        End Date:
        <input type="date" id="endDate" />
      </label>
      <button id="getImages">🚀 Blast Off! Get Space Images</button>
    </div>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>

  <!-- Modal for image details (move this above the scripts) -->
  <div id="imageModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span id="closeModal" class="close" style="cursor:pointer;">&times;</span>
      <img id="modalImage" src="" alt="" class="modal-image" style="max-width:100%;display:block;margin:auto;" />
      <h2 id="modalTitle"></h2>
      <p id="modalDate"></p>
      <p id="modalExplanation"></p>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
